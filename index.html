<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matsolpharma — Delivery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde: #1a4a3a;
    --verde-light: #e8f4ef;
    --verde-mid: #2d7a5a;
    --border-c: #e2e8e4;
    --bg: #f7f9f8;
    --white: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b7c74;
    --text-light: #9aaba3;
    --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--verde); color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-name { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 11px; opacity: 0.65; margin-top: 1px; }
  .day-tabs { display: flex; gap: 4px; }
  .day-tab { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 13px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .day-tab.active { background: white; color: var(--verde); font-weight: 600; }
  .day-tab:hover:not(.active) { background: rgba(255,255,255,0.22); }
  .main { display: flex; height: calc(100vh - 56px); }
  .sidebar { width: 290px; min-width: 290px; background: var(--white); border-right: 1px solid var(--border-c); display: flex; flex-direction: column; }
  .search-wrap { padding: 12px; border-bottom: 1px solid var(--border-c); }
  .search-inner { position: relative; }
  .search-inner input { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border-c); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-inner input:focus { border-color: var(--verde); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 14px; pointer-events: none; }
  .list-meta { padding: 7px 14px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border-c); display: flex; justify-content: space-between; }
  .doctor-list { overflow-y: auto; flex: 1; }
  .doctor-item { padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--border-c); display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
  .doctor-item:hover { background: var(--bg); }
  .doctor-item.active { background: var(--verde-light); border-left: 3px solid var(--verde); padding-left: 11px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--verde); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .avatar.in-route { background: var(--verde-mid); box-shadow: 0 0 0 2px white, 0 0 0 3.5px var(--verde-mid); }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-spec { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .check-mark { color: var(--verde); font-size: 15px; flex-shrink: 0; }
  .no-results { padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .loading-state { padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .error-state { padding: 14px; margin: 10px; background: #fff3f3; border: 1px solid #fecaca; border-radius: var(--radius); font-size: 12px; color: #991b1b; line-height: 1.6; }
  .retry-btn { margin-top: 8px; padding: 6px 12px; background: var(--verde); color: white; border: none; border-radius: var(--radius); font-size: 12px; cursor: pointer; }
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .detail-panel { flex: 1; padding: 24px; overflow-y: auto; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text-muted); }
  .empty-icon { font-size: 42px; opacity: 0.25; }
  .empty-state p { font-size: 14px; }
  .doc-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-c); }
  .avatar-lg { width: 54px; height: 54px; border-radius: 50%; background: var(--verde); color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; }
  .doc-title { font-size: 19px; font-weight: 600; }
  .doc-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .card { background: var(--white); border: 1px solid var(--border-c); border-radius: 10px; padding: 15px 18px; margin-bottom: 14px; }
  .card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 8px; }
  .address-text { font-size: 14px; line-height: 1.65; }
  .action-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: var(--radius); font-size: 12px; cursor: pointer; text-decoration: none; border: 1px solid var(--border-c); background: var(--white); color: var(--text); transition: all 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn-maps { border-color: #93c5fd; color: #1d4ed8; }
  .btn-maps:hover { background: #eff6ff; }
  .btn-pdf { border-color: #fca5a5; color: #dc2626; }
  .btn-pdf:hover { background: #fef2f2; }
  .btn-add { border-color: #86efac; color: #166534; background: var(--verde-light); }
  .btn-add:hover { background: #d1fae5; }
  .btn-remove { border-color: #fdba74; color: #c2410c; background: #fff7ed; }
  .btn-remove:hover { background: #ffedd5; }
  .dias-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .dia-badge { padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--verde-light); color: var(--verde); }
  .route-bar { border-top: 1px solid var(--border-c); background: var(--white); padding: 14px 20px; }
  .route-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .route-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .route-count-badge { background: var(--verde); color: white; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .chips-row { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; margin-bottom: 12px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; background: var(--verde); color: white; border-radius: 20px; padding: 4px 10px; font-size: 12px; }
  .chip-num { background: rgba(255,255,255,0.25); border-radius: 50%; width: 17px; height: 17px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
  .chip-remove { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; padding: 0; display: flex; align-items: center; margin-left: 2px; }
  .chip-remove:hover { color: white; }
  .route-empty-msg { font-size: 12px; color: var(--text-light); padding: 4px 0; align-self: center; }
  .route-actions { display: flex; gap: 8px; align-items: center; }
  .btn-wa { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; background: #25D366; color: white; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.12s; }
  .btn-wa:hover:not(:disabled) { background: #20bb5a; }
  .btn-wa:disabled { background: #a7f3d0; cursor: not-allowed; color: rgba(255,255,255,0.7); }
  .btn-clear { background: none; border: 1px solid var(--border-c); color: var(--text-muted); padding: 9px 13px; border-radius: var(--radius); font-size: 12px; cursor: pointer; }
  .btn-clear:hover { background: var(--bg); }
  @media (max-width: 680px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: unset; max-height: 42vh; border-right: none; border-bottom: 1px solid var(--border-c); }
    .content { min-height: 300px; }
    .detail-panel { padding: 16px; }
    .route-bar { padding: 12px 16px; }
    .day-tab { padding: 4px 9px; font-size: 11px; }
    .header { padding: 0 12px; }
  }
  @media (max-width: 400px) {
    .day-tab { padding: 4px 7px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-name">Matsolpharma</div>
    <div class="logo-sub">Sistema de delivery</div>
  </div>
  <div class="day-tabs">
    <button class="day-tab active" onclick="setDay('Lunes',this)">Lun</button>
    <button class="day-tab" onclick="setDay('Miércoles',this)">Mié</button>
    <button class="day-tab" onclick="setDay('Viernes',this)">Vie</button>
    <button class="day-tab" onclick="setDay('todos',this)">Todos</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar doctor/a..." oninput="renderList()" />
      </div>
    </div>
    <div class="list-meta">
      <span id="listCount">Cargando...</span>
      <span id="routeInList" style="color:var(--verde);font-weight:600"></span>
    </div>
    <div class="doctor-list" id="doctorList">
      <div class="loading-state">⏳ Cargando doctores...</div>
    </div>
  </div>

  <div class="content">
    <div class="detail-panel" id="detailPanel">
      <div class="empty-state">
        <div class="empty-icon">🏥</div>
        <p>Selecciona un doctor para ver su información</p>
      </div>
    </div>
    <div class="route-bar">
      <div class="route-top">
        <span class="route-title">🗺️ Ruta del día <span class="route-count-badge" id="routeCountBadge">0</span></span>
      </div>
      <div class="chips-row" id="chipsRow">
        <span class="route-empty-msg">Agrega doctores desde su ficha</span>
      </div>
      <div class="route-actions">
        <button class="btn-wa" id="waBtn" onclick="sendWhatsApp()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          Enviar por WhatsApp
        </button>
        <button class="btn-clear" onclick="clearRoute()">Limpiar ruta</button>
        <button class="btn-clear" onclick="loadDoctors()" title="Recargar datos del sheet">🔄</button>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '2PACX-1vS_fPZEJuhouzeZQbUPnElOymGeV1kql9gH2IObxLFHGwzbNnOrJUn9izSFXwUBx9a0AgRxCl1KzkYH';
const CSV_URL_BASE = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=csv`;
function getCsvUrl() { return CSV_URL_BASE + '&_cb=' + Date.now(); }
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&_=${Date.now()}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://proxy.cors.sh/${url}`,
];

let allDoctors = [];
let currentDay = 'Lunes';
let selectedId = null;
let route = [];

function openExternal(url) {
  if (!url) return;
  const win = window.open(url, '_blank', 'noopener,noreferrer');
  if (!win) {
    // Si el navegador bloqueó el popup, copiamos el link para que lo pegue manualmente
    navigator.clipboard?.writeText(url).catch(()=>{});
    alert('El navegador bloqueó la ventana emergente. Link copiado, pégalo en una pestaña nueva:\n\n' + url);
  }
}

function initials(name) {
  return name.replace(/^Dr[a]?\.\s*/i,'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
}

function parseCSVLine(line) {
  const vals = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else { inQ = !inQ; }
    } else if (ch === ',' && !inQ) {
      vals.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  vals.push(cur);
  return vals;
}

function cleanUrl(raw) {
  if (!raw) return '';
  let url = raw.trim().replace(/^"|"$/g, '');
  url = url.replace(/\\([_\-.])/g, '$1');
  if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url.replace(/^\/+/, '');
  return url;
}

function parseCSV(text) {
  const rawLines = text.replace(/\r/g, '').split('\n');
  const lines = [];
  let buffer = '';
  for (const l of rawLines) {
    buffer += (buffer ? '\n' : '') + l;
    const quoteCount = (buffer.match(/"/g) || []).length;
    if (quoteCount % 2 === 0) { lines.push(buffer); buffer = ''; }
  }
  if (buffer) lines.push(buffer);
  if (lines.length < 2) return [];

  const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map((line, idx) => {
    if (!line.trim()) return null;
    const vals = parseCSVLine(line);
    const obj = { id: idx + 1 };
    headers.forEach((h, i) => {
      let v = (vals[i] || '').trim().replace(/^"|"$/g,'');
      obj[h] = v;
    });
    obj.dias = obj.dias ? obj.dias.split(',').map(d => d.trim()).filter(Boolean) : [];
    obj.maps = cleanUrl(obj.maps);
    obj.pdf = cleanUrl(obj.pdf);
    return obj;
  }).filter(d => d && d.nombre && d.nombre.trim());
}

async function tryFetch(url, proxyFn) {
  const res = await fetch(proxyFn(url), { cache: 'no-store' });
  if (!res.ok) throw new Error('Status ' + res.status);
  const buffer = await res.arrayBuffer();
  return new TextDecoder('utf-8').decode(buffer);
}

async function loadDoctors() {
  document.getElementById('doctorList').innerHTML = '<div class="loading-state">⏳ Cargando doctores...</div>';
  document.getElementById('listCount').textContent = 'Cargando...';

  const freshUrl = getCsvUrl();
  let lastError = null;
  for (const proxyFn of PROXIES) {
    try {
      const text = await tryFetch(freshUrl, proxyFn);
      if (!text || text.length < 10) throw new Error('Respuesta vacía');
      allDoctors = parseCSV(text);
      if (allDoctors.length === 0) throw new Error('Sin datos válidos');
      renderList();
      return;
    } catch(e) {
      lastError = e;
    }
  }

  // Todos los proxies fallaron
  document.getElementById('doctorList').innerHTML = `
    <div class="error-state">
      ⚠️ No se pudo cargar la lista de doctores.<br><br>
      Posibles causas:<br>
      • El sheet no está publicado (Archivo → Publicar en la web)<br>
      • Problemas de conexión<br><br>
      <small>${lastError?.message || ''}</small><br>
      <button class="retry-btn" onclick="loadDoctors()">🔄 Reintentar</button>
    </div>`;
  document.getElementById('listCount').textContent = 'Error';
}

function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  return allDoctors.filter(d => {
    const dayOk = currentDay === 'todos' || d.dias.includes(currentDay);
    const searchOk = !q || d.nombre.toLowerCase().includes(q) || (d.especialidad||'').toLowerCase().includes(q);
    return dayOk && searchOk;
  });
}

function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById('doctorList');
  const meta = document.getElementById('listCount');
  const routeInfo = document.getElementById('routeInList');
  meta.textContent = filtered.length + ' doctor' + (filtered.length !== 1 ? 'es' : '');
  routeInfo.textContent = route.length ? route.length + ' en ruta' : '';
  if (!filtered.length) { list.innerHTML = '<div class="no-results">Sin resultados</div>'; return; }
  list.innerHTML = filtered.map(d => {
    const inRoute = route.find(r => r.id === d.id);
    return `<div class="doctor-item${selectedId === d.id ? ' active' : ''}" onclick="selectDoctor(${d.id})">
      <div class="avatar${inRoute ? ' in-route' : ''}">${initials(d.nombre)}</div>
      <div class="doc-info">
        <div class="doc-name">${d.nombre}</div>
        <div class="doc-spec">${d.especialidad || ''}</div>
      </div>
      ${inRoute ? '<span class="check-mark">✓</span>' : ''}
    </div>`;
  }).join('');
}

function selectDoctor(id) {
  selectedId = id;
  renderList();
  const d = allDoctors.find(x => x.id === id);
  if (!d) return;
  const inRoute = route.find(r => r.id === id);
  const routeIdx = route.findIndex(r => r.id === id);
  document.getElementById('detailPanel').innerHTML = `
    <div class="doc-header">
      <div class="avatar-lg">${initials(d.nombre)}</div>
      <div>
        <div class="doc-title">${d.nombre}</div>
        <div class="doc-subtitle">${d.especialidad || 'Sin especialidad'}</div>
      </div>
    </div>
    ${d.dias?.length ? `<div class="card"><div class="card-label">📅 Días de entrega</div><div class="dias-row">${d.dias.map(dia=>`<span class="dia-badge">${dia}</span>`).join('')}</div></div>` : ''}
    <div class="card">
      <div class="card-label">📍 Dirección de envío</div>
      <div class="address-text">${d.direccion || '<em style="color:var(--text-muted)">Sin dirección registrada</em>'}</div>
      <div class="action-row">
        ${d.maps ? `<button class="btn btn-maps" onclick="openExternal('${d.maps.replace(/'/g,"\\'")}')">🗺️ Ver en Google Maps</button>` : ''}
        ${d.pdf ? `<button class="btn btn-pdf" onclick="openExternal('${d.pdf.replace(/'/g,"\\'")}')">📄 Descargar PDF</button>` : ''}
      </div>
    </div>
    ${d.telefono ? `<div class="card"><div class="card-label">📞 Contacto</div><div style="font-size:14px">${d.telefono}</div></div>` : ''}
    <div class="card">
      <div class="card-label">🗺️ Ruta del día</div>
      ${inRoute
        ? `<button class="btn btn-remove" onclick="removeFromRoute(${d.id})">✕ Parada #${routeIdx+1} — Quitar de ruta</button>`
        : `<button class="btn btn-add" onclick="addToRoute(${d.id})">+ Agregar a la ruta</button>`}
    </div>`;
}

function addToRoute(id) {
  const d = allDoctors.find(x => x.id === id);
  if (d && !route.find(r => r.id === id)) route.push(d);
  renderRoute(); renderList(); selectDoctor(id);
}

function removeFromRoute(id) {
  route = route.filter(r => r.id !== id);
  renderRoute(); renderList();
  if (selectedId === id) selectDoctor(id);
}

function clearRoute() {
  route = [];
  renderRoute(); renderList();
  if (selectedId) selectDoctor(selectedId);
}

function renderRoute() {
  const chips = document.getElementById('chipsRow');
  const badge = document.getElementById('routeCountBadge');
  const waBtn = document.getElementById('waBtn');
  badge.textContent = route.length;
  waBtn.disabled = route.length === 0;
  if (!route.length) { chips.innerHTML = '<span class="route-empty-msg">Agrega doctores desde su ficha</span>'; return; }
  chips.innerHTML = route.map((d,i) => `
    <div class="chip">
      <span class="chip-num">${i+1}</span>
      <span>${d.nombre.replace(/^Dr[a]?\.\s*/i,'').split(' ').slice(0,2).join(' ')}</span>
      <button class="chip-remove" onclick="removeFromRoute(${d.id})">✕</button>
    </div>`).join('');
}

function setDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderList();
}

function sendWhatsApp() {
  if (!route.length) return;
  const dayLabel = currentDay === 'todos' ? 'HOY' : currentDay.toUpperCase();
  let msg = `🏥 *RUTA DE DELIVERY MATSOLPHARMA*\n📅 ${dayLabel}\n─────────────────────\n\n`;
  route.forEach((d,i) => {
    msg += `*${i+1}. ${d.nombre}*\n`;
    if (d.especialidad) msg += `   ${d.especialidad}\n`;
    if (d.direccion) msg += `📍 ${d.direccion}\n`;
    if (d.maps) msg += `🗺️ ${d.maps}\n`;
    if (d.telefono) msg += `📞 ${d.telefono}\n`;
    msg += '\n';
  });
  msg += `─────────────────────\n✅ Total: ${route.length} parada${route.length!==1?'s':''}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

loadDoctors();
</script>
